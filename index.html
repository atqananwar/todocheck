<!DOCTYPE html>
<html>
<head>
  <base href="/todocheck/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ToDoCheck">
  <meta name="theme-color" content="#1C1C1E">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>ToDoCheck</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --app-height: 100%; }
    html { height: var(--app-height); }
    body {
      width: 100%; height: var(--app-height); max-height: var(--app-height);
      background: #1C1C1E; overflow: hidden; position: fixed;
      -webkit-tap-highlight-color: transparent; overscroll-behavior: none;
    }
    #splash {
      position: fixed; inset: 0; background: #1C1C1E;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-icon { width: 100px; height: 100px; border-radius: 22px; overflow: hidden; margin-bottom: 20px; }
    #splash-icon img { width: 100%; height: 100%; object-fit: cover; }
    #splash-title { font-family: -apple-system, sans-serif; font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    #splash-sub { font-family: -apple-system, sans-serif; font-size: 14px; color: #8E8E93; margin-top: 6px; }
    @media (prefers-color-scheme: light) {
      html, body, #splash { background: #F2F2F7; }
      #splash-title { color: #1C1C1E; }
    }
    #notif-prompt {
      display: none; position: fixed; bottom: 80px; left: 16px; right: 16px;
      background: #2C2C2E; border-radius: 16px; padding: 16px;
      z-index: 8888; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 0.5px solid rgba(255,255,255,0.1);
    }
    #notif-prompt.show { display: block; }
    #notif-prompt h3 { color: #fff; font-size: 15px; font-weight: 600; margin-bottom: 6px; font-family: -apple-system, sans-serif; }
    #notif-prompt p { color: #8E8E93; font-size: 13px; margin-bottom: 14px; font-family: -apple-system, sans-serif; }
    #notif-prompt .btns { display: flex; gap: 8px; }
    #notif-allow { flex: 1; background: #0A84FF; color: #fff; border: none; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
    #notif-deny { flex: 1; background: #3A3A3C; color: #fff; border: none; border-radius: 10px; padding: 10px; font-size: 14px; cursor: pointer; }
    #notif-banner {
      display: none; position: fixed; top: 16px; left: 16px; right: 16px;
      background: #2C2C2E; border-radius: 14px; padding: 14px 16px;
      z-index: 99999; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      border: 0.5px solid rgba(255,255,255,0.1);
      font-family: -apple-system, sans-serif;
      flex-direction: row; align-items: flex-start; gap: 12px;
    }
    #notif-banner.show { display: flex; }
    #notif-banner-icon { font-size: 20px; }
    #notif-banner-body { flex: 1; }
    #notif-banner-title { color: #fff; font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    #notif-banner-text { color: #8E8E93; font-size: 12px; }
    #notif-banner-close { background: none; border: none; color: #8E8E93; font-size: 20px; cursor: pointer; padding: 0; }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-icon"><img src="icons/Icon-192.png" alt="ToDoCheck"/></div>
    <div id="splash-title">ToDoCheck</div>
    <div id="splash-sub">Loading your tasks...</div>
  </div>

  <div id="notif-prompt">
    <h3>🔔 Stay on track</h3>
    <p>Allow notifications to get reminders for your tasks and deadlines.</p>
    <div class="btns">
      <button id="notif-allow">Allow</button>
      <button id="notif-deny">Not now</button>
    </div>
  </div>

  <div id="notif-banner">
    <span id="notif-banner-icon">🔔</span>
    <div id="notif-banner-body">
      <div id="notif-banner-title"></div>
      <div id="notif-banner-text"></div>
    </div>
    <button id="notif-banner-close" onclick="document.getElementById('notif-banner').classList.remove('show')">×</button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAoeSN1lDb-1sfhRvvLZey3s4w49QEVC8k",
      authDomain: "todocheck-e5295.firebaseapp.com",
      projectId: "todocheck-e5295",
      storageBucket: "todocheck-e5295.firebasestorage.app",
      messagingSenderId: "774333929403",
      appId: "1:774333929403:web:511ef39c0299ca6f16d69e"
    };
    const VAPID_KEY = 'BOIHA6q3ziYlkYXbLJ1KLSMkVz1ZgHelyhk4VUpTfBV8Jd5IBQJzOwkFoCXAoQzxJLt-_S4UAah_v09ol5JaF3Q';
    let messaging = null;

    async function initFirebase() {
      try {
        const app = initializeApp(firebaseConfig);
        messaging = getMessaging(app);
        onMessage(messaging, (payload) => {
          showBanner(payload.notification?.title, payload.notification?.body);
        });
      } catch (e) { console.warn('Firebase init:', e); }
    }

    async function registerSW() {
      if ('serviceWorker' in navigator) {
        try {
          await navigator.serviceWorker.register('/todocheck/firebase-messaging-sw.js', { scope: '/todocheck/' });
          console.log('SW registered');
        } catch (e) { console.warn('SW failed:', e); }
      }
    }

    window.requestNotificationPermission = async function() {
      try {
        const perm = await Notification.requestPermission();
        if (perm === 'granted') {
          localStorage.setItem('notifGranted', 'true');
          if (messaging) {
            const token = await getToken(messaging, { vapidKey: VAPID_KEY });
            localStorage.setItem('fcmToken', token);
            console.log('FCM Token:', token);
          }
          return true;
        }
        return false;
      } catch (e) { console.warn('Permission error:', e); return false; }
    };

    // Show in-app banner
    window.showBanner = function(title, body) {
      const banner = document.getElementById('notif-banner');
      document.getElementById('notif-banner-title').textContent = title || 'ToDoCheck';
      document.getElementById('notif-banner-text').textContent = body || '';
      banner.classList.add('show');
      setTimeout(() => banner.classList.remove('show'), 5000);
    };

    // Check due reminders — reads from localStorage (same place Flutter writes)
    window.checkReminders = function() {
      try {
        const raw = localStorage.getItem('todocheck_reminders');
        if (!raw) return;
        const reminders = JSON.parse(raw);
        const now = new Date();
        const due = [], keep = [];

        for (const r of reminders) {
          if (new Date(r.time) <= now) due.push(r);
          else keep.push(r);
        }

        if (due.length > 0) {
          localStorage.setItem('todocheck_reminders', JSON.stringify(keep));
          for (const r of due) {
            console.log('Firing reminder:', r.title);
            if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
              try {
                new Notification(r.title, {
                  body: r.body || 'Reminder from ToDoCheck',
                  icon: '/todocheck/icons/Icon-192.png',
                  badge: '/todocheck/icons/Icon-192.png',
                  tag: r.id,
                });
              } catch (e) {
                // iOS Safari fallback
                window.showBanner(r.title, r.body);
              }
            } else {
              window.showBanner(r.title, r.body);
            }
          }
        }
      } catch (e) { console.warn('checkReminders error:', e); }
    };

    function showNotifPrompt() {
      if (typeof Notification !== 'undefined' &&
          Notification.permission === 'default' &&
          localStorage.getItem('notifDismissed') !== 'true') {
        setTimeout(() => document.getElementById('notif-prompt')?.classList.add('show'), 3000);
      }
    }

    document.getElementById('notif-allow').addEventListener('click', async () => {
      document.getElementById('notif-prompt').classList.remove('show');
      const granted = await window.requestNotificationPermission();
      if (granted) window.showBanner('Notifications enabled! 🎉', 'You will now receive task reminders.');
    });

    document.getElementById('notif-deny').addEventListener('click', () => {
      document.getElementById('notif-prompt').classList.remove('show');
      localStorage.setItem('notifDismissed', 'true');
    });

    // iOS viewport fix
    function fixViewport() {
      const h = window.innerHeight;
      document.documentElement.style.setProperty('--app-height', h + 'px');
      document.documentElement.style.height = h + 'px';
      window.scrollTo(0, 0);
      document.body.scrollTop = 0;
      document.body.style.display = 'none';
      document.body.offsetHeight;
      document.body.style.display = '';
      window.dispatchEvent(new Event('resize'));
    }

    fixViewport();
    window.addEventListener('load', () => { fixViewport(); setTimeout(fixViewport, 100); setTimeout(fixViewport, 500); setTimeout(fixViewport, 1000); });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        fixViewport();
        setTimeout(fixViewport, 100);
        setTimeout(fixViewport, 300);
        window.checkReminders();
      }
    });
    window.addEventListener('pageshow', fixViewport);
    window.addEventListener('focus', () => setTimeout(fixViewport, 50));

    window.addEventListener('flutter-first-frame', () => {
      fixViewport();
      setTimeout(fixViewport, 200);
      const s = document.getElementById('splash');
      if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 500); }
      showNotifPrompt();
      // Check every 30 seconds for more accurate reminders
      setInterval(window.checkReminders, 30000);
      window.checkReminders();
    });

    await registerSW();
    await initFirebase();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
